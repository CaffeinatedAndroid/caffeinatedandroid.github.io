<!DOCTYPE html>
<html lang="en">

<head>
<style>

@font-face {
  font-family: "MozillaHeadline";
  src: url("media/fonts/Mozilla_Headline/static/MozillaHeadline-Bold.ttf") format("truetype");
  font-weight: 700;
  font-style: normal;
}

body {
  font-family: "MozillaHeadline", Arial, sans-serif;

  position: fixed;
  inset: 0;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
}

landing {
  position: fixed;
  inset: 0;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;

  background: #000;
  color: #fff;

  font-size: 30px;
  font-weight: 600;

  overflow: hidden;

}


.hero-image {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  width: 100%;
  height: 100%;

  position: relative;
  z-index: 5;

  padding: 20px;
}




landing_button,
#changeText {
  background: #0056b3;
  color: #fff;

  padding: 20px;

  border: none;
  border-radius: 6px;

  cursor: pointer;

  font-family: "MozillaHeadline", Arial, sans-serif;
  font-size: 25px;

  transition: background 0.3s ease-in-out;
}


.hero-description {
  max-width: 650px;
  width: 100%;

  margin: 20px;


  text-align: center;
}

.hero-text,
#central-content,
p,
.glitch-text,
landing_button {
  position: relative;
  z-index: 6;
  padding: 10px;
  font-family: "MozillaHeadline", sans-serif;
}



.glitch-text {
  color: #fff;

  margin-bottom: 0;

  text-shadow: 0 0 5px #3a9efc;

  animation: textglitch 3s infinite;
}

@keyframes textglitch {
  0% {
    transform: translate(0);
  }

  20% {
    transform: translate(-3px, 3px);
  }

  40% {
    transform: translate(-3px, -3px);
  }

  60% {
    transform: translate(3px, 3px);
  }

  80% {
    transform: translate(3px, -3px);
  }

  100% {
    transform: translate(0);
  }
}



#scanlines,
#crt-effect,
#noise {
  position: absolute;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  pointer-events: none;

  z-index: 10;
}

#scanlines {
  background: repeating-linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.15),
    rgba(0, 0, 0, 0.15) 1px,
    transparent 2px,
    transparent 4px
  );
}

#crt-effect {
  background: radial-gradient(
    ellipse at center,
    transparent 50%,
    rgba(0, 0, 0, 0.5) 100%
  );
}

#noise {
  opacity: 0.03;

  background-image: url("media/images/noise.png");
}


.glitch-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;

  width: 100%;
  background: transparent;
}

.glitch {
  position: relative;

  color: #fff;

  font-size: 78px;
  font-weight: bold;
  letter-spacing: 3px;

  z-index: 1;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);

  position: absolute;

  top: 0;
  left: 0;

  display: block;

  opacity: 0.8;
}

.glitch::before {
  color: #00ffff;

  z-index: -1;

  animation: glitch-it 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
}

.glitch::after {
  color: #ff00ff;

  z-index: -2;

  animation: glitch-it 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse infinite;
}

@keyframes glitch-it {
  0% {
    transform: translate(0);
  }

  20% {
    transform: translate(-2px, 2px);
  }

  40% {
    transform: translate(-2px, -2px);
  }

  60% {
    transform: translate(2px, 2px);
  }

  80% {
    transform: translate(2px, -2px);
  }

  100% {
    transform: translate(0);
  }
}


shader-doodle {

  width: 100%;
  height: 100%;

  position: absolute;
  z-index: 1;

  padding: 0px;

}

@keyframes wipe {
  from {
    top: 0%;
  }

  to {
    top: 100%;
  }
}

@keyframes wipe2 {
  from {
    top: 0%;
  }

  to {
    top: 100%;
  }
}

.bar,
.bar2,
.bar3 {
  position: relative;

  width: 150%;

  background-color: rgba(0, 0, 0, 0.1);
}

.bar {
  height: 10px;
  z-index: 2;

  animation: wipe 5s infinite;
}

.bar2 {
  height: 20px;
  z-index: 3;

  animation: wipe2 2s infinite;
}

.bar3 {
  height: 40px;
  z-index: 4;

  animation: wipe2 6s infinite;
}



@media (max-width: 768px) {

  landing {
    font-size: 20px;
    padding: 20px;
  }

  .glitch {
    font-size: 42px;
    letter-spacing: 2px;
  }

  .hero-description {
    max-width: 100%;
    padding: 0 16px;
    font-size: 18px;
  }

  landing_button {
    font-size: 20px;
    padding: 16px 24px;
  }
}

</style>


      <script src="https://unpkg.com/shader-doodle@alpha"></script>
      <meta charset="UTF-8">

      <meta name="viewport" content="width=device-width, initial-scale=1.0">

      <title>Digital Garden</title>

</head>

<body>
      <landing>



                <shader-doodle>
                  <script id="shaderv" type="x-shader/x-fragment">
                    /**************************
                    Void shader by Griffith Thomas
                    (@KiranWells - Codepen),
                    inspired by Minecraft end portal blocks
                    **************************/

                    float scale = 6.0;

                    float random(in vec2 _st) {
                      return fract(dot(vec2((mod(_st.x / cos(_st.y), 5.0) * 1000.0)), vec2(1.1)));
                    }

                    vec2 random2(vec2 p) {
                      return vec2(random(p), random(p.yx + random(p)));
                    }

                    vec2 cell(vec2 st) {
                      vec2 i = floor(st);
                      vec2 f = fract(st);

                      vec2 point = random2(i);
                      vec2 dir = random2(-i);

                      point += cos(u_time + random(i) * 12.2 + point.y) * dir / 4.;

                      vec2 diff = point - f;

                      return smoothstep(0.1, 0.11, abs(diff));
                    }

                    void main() {

                      vec2 st = gl_FragCoord.xy / 1000.0 * scale + 2.0;

                      vec3 color  = vec3(0.0);
                      vec3 black  = vec3(0.0);
                      vec3 green  = vec3(0.1, 0.2, 0.4);
                      vec3 dgreen = vec3(0.2, 0.2, 0.3);
                      vec3 bgreen = vec3(0.1, 0.4, 0.8);

                      for (float i = 0.; i < 2.; i++) {

                        vec2 dist = cell(st * i).xy;
                        color += mix(green, black, dist.x + dist.y);

                        dist = cell(st * (2. + i)).xy;
                        color += mix(dgreen, black, dist.x + dist.y);

                        dist = cell(st * (3. + i)).xy;
                        color += mix(bgreen, black, dist.x + dist.y);
                      }

                      gl_FragColor = vec4(color, 0.7);
                    }
                  </script>
                </shader-doodle>
              <div class="bar" style="animation: wipe 1s infinite 2s;"></div>
              <div class="bar" style="background-color: rgba(255,255,255,0.1);"></div>

              <div class="bar2" style="animation: wipe2 1s infinite 2s;"></div>
              <div class="bar2" style="background-color: rgba(255,255,255,0.1);"></div>

              <div class="bar3" style="animation: wipe2 1s infinite 2s;"></div>
              <div class="bar3" style="background-color: rgba(255,255,255,0.1);"></div>

              <div id="scanlines"></div>
              <div id="crt-effect"></div>
              <div id="noise"></div>

              <div class="hero-image">
                <div class="hero-text">
                </div>

                <div class="glitch-wrapper">
                  <div class="glitch" data-text="DIGITAL GARDEN">
                    DIGITAL GARDEN
                  </div>
                </div>
                <p class="hero-description">
                  Welcome to my portfolio, here lies electric sheep and disrupted sleep
                </p>

                <audio
                  id="bgSound"
                  src="media/audio/win95.mp3"
                  preload="auto">
                </audio>

                <div class="glitch-text">
                  <landing_button onclick="document.getElementById('bgSound').play()">
                    Power Up The Electric Sheep
                  </landing_button>
                </div>

                <script>
                  window.addEventListener("load", () => {

                    const audio = document.getElementById("bgSound");

                    audio.volume = 0.25;

                    audio.addEventListener("ended", () => {
                      window.location.href = "index.html";
                    });

                  });
                </script>

                <script>
                  const chars =
                    "x9R!&jT8w4M#2kL0z@6Q*1U$o3A%r7P#y5X^c9J(v7W&2B!re8L$0m*Z+d3T^7aF#n6R!@5W%k1O#8jQ*p9M&0xY$";

                  const colors = [
                    "#FF69B4",
                    "#FF1493"
                  ];

                  document.querySelectorAll(".cube-face canvas").forEach(canvas => {

                    const ctx = canvas.getContext("2d");

                    canvas.width = 100;
                    canvas.height = 100;

                    const fontSize = 10;
                    const columns = Math.floor(canvas.width / fontSize);

                    const drops = [];

                    for (let i = 0; i < columns; i++) {
                      drops[i] = Math.random() * 10;
                    }

                    function draw() {

                      ctx.fillStyle = "rgba(0,0,0,0.12)";
                      ctx.fillRect(0, 0, canvas.width, canvas.height);

                      ctx.font = `${fontSize}px monospace`;

                      for (let i = 0; i < columns; i++) {

                        ctx.fillStyle =
                          colors[Math.floor(Math.random() * colors.length)];

                        ctx.fillText(
                          chars[Math.floor(Math.random() * chars.length)],
                          i * fontSize,
                          drops[i] * fontSize
                        );

                        drops[i]++;

                        if (
                          drops[i] * fontSize > canvas.height ||
                          Math.random() > 0.98
                        ) {
                          drops[i] = 0;
                        }
                      }
                    }

                    setInterval(draw, 50);

                  });
              </script>
              </div>
      </landing>

</body>
</html>
